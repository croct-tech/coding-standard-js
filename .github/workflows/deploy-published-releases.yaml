name: Release

on:
  release:
    types:
      - published

jobs:
  deploy:
    uses: croct-tech/github-workflows/.github/workflows/publish-npm-package.yml@unify-workflows
    with:
      node-version: "24"
      build-dir: "dist"
      publish-access: "public"
      prepare-script: >-
        cp package.json LICENSE README.md dist/ &&
        cd dist &&
        sed -i -e "s~\"version\": \"0.0.0-dev\"~\"version\": \"${GITHUB_REF##*/}\"~" package.json &&
        sed -i -e "s~\"main\": \"dist/index.js\"~\"main\": \"index.js\"~" package.json &&
        sed -i -e "s~\"types\": \"dist/index.d.ts\"~\"types\": \"index.d.ts\"~" package.json
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
